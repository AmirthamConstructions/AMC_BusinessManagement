<!-- gst1r_outward.html (patched) -->
<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GST-1 Outward</title>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

<style>
  :root {
    --white:#ffffff;
    --teal:#dca612;
    --light-aqua:#fae5aa;
    --light-black:#2e2e2e;
    --muted:#7b8086;
    --card-shadow:0 2px 10px rgba(0,0,0,0.06);
    --rounded:10px;
    --font-sans:'Poppins','Roboto',sans-serif;
  }

  body{
    font-family:var(--font-sans);
    margin:16px;
    background:#f6f9fa;
    color:var(--light-black);
  }

  .top-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:14px;
  }

  .title-block h1{margin:0;font-size:20px;}
  .title-block p{margin:0;color:var(--muted);font-size:13px;}

  .controls{
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
  }

  .input,.select{
    padding:8px 10px;
    border-radius:6px;
    border:1px solid #ddd;
    font-size:13px;
    min-height:36px;
  }

  .btn{
    background:var(--teal);
    color:#fff;
    padding:8px 12px;
    border-radius:6px;
    border:none;
    cursor:pointer;
    font-size:13px;
  }

  .btn.ghost{
    background:transparent;
    border:1px solid var(--teal);
    color:var(--teal);
  }

  .btn.small{
    padding:6px 8px;
    font-size:12px;
  }

  .summary-card{
    background:var(--white);
    padding:14px;
    border-radius:var(--rounded);
    box-shadow:var(--card-shadow);
    margin-bottom:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
  }

  .period{
    color:var(--muted);
    font-weight:600;
    font-size:13px;
  }

  .stats{display:flex;gap:10px;}

  .stat-item{
    background:var(--light-aqua);
    padding:10px 14px;
    border-radius:8px;
    min-width:150px;
    text-align:left;
  }

  .stat-label{
    font-size:12px;
    color:var(--muted);
    text-transform:uppercase;
  }

  .stat-val{
    font-size:18px;
    font-weight:600;
    margin-top:6px;
  }

  .tabs{display:flex;gap:6px;margin-bottom:10px;}

  .tab{
    padding:8px 12px;
    background:transparent;
    border-radius:8px;
    cursor:pointer;
    color:var(--muted);
    border:1px solid transparent;
  }

  .tab.active{
    background:var(--teal);
    color:#fff;
    border-color:var(--teal);
  }

  .table-card{
    background:var(--white);
    padding:12px;
    border-radius:var(--rounded);
    box-shadow:var(--card-shadow);
    overflow-x:auto;
  }

  table{
    width:100%;
    border-collapse:collapse;
    min-width:1000px;
  }

  th,td{
    padding:10px 8px;
    border-bottom:1px solid #f1f1f1;
    text-align:left;
    font-size:13px;
  }

  th{
    text-align:center;
    font-weight:600;
    background:#fafafa;
  }

  td.center{text-align:center;}
  .num{text-align:right;white-space:nowrap;}

  .pagination{
    display:flex;
    gap:6px;
    align-items:center;
    margin:8px 0;
    flex-wrap:wrap;
  }

  .page-btn{
    padding:6px 8px;
    border-radius:6px;
    background:#f5f7f7;
    border:1px solid #eee;
    cursor:pointer;
  }

  .page-btn.active{
    background:var(--teal);
    color:#fff;
    border-color:var(--teal);
  }

  #supProcessing{
    position:fixed;
    inset:0;
    background:rgba(255,255,255,0.85);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:9999;
    font-size:16px;
  }

  #supProcessing i{margin-right:8px;}

  /* ================= MODAL ================= */

  .sup-modal{
    position:fixed;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    background:#fff;
    padding:16px;
    width:820px;
    max-width:96vw;
    max-height:90vh;
    overflow-y:auto;
    border-radius:10px;
    display:none;
    z-index:2100;
    box-shadow:0 10px 40px rgba(0,0,0,0.1);
  }

  .sup-modal h3{margin:0 0 8px 0;}

  /* ✅ DESKTOP GRID (THIS WAS MISSING) */
  .form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    margin-top:8px;
  }

  .form-group{
    display:flex;
    flex-direction:column;
  }

  .form-group.full{
    grid-column:1 / -1;
  }

  .req{color:red;}

  .modal-actions{
    text-align:right;
    margin-top:14px;
    position:sticky;
    bottom:0;
    background:#fff;
    padding-top:10px;
  }

  /* legacy helper (unchanged) */
  .modal-row{display:flex;gap:8px;margin-top:8px;}
  .modal-row > div{flex:1;}

  /* ================= MOBILE ================= */
  @media (max-width:640px){
    .sup-modal{
      width:96vw;
      padding:12px;
    }

    .form-grid{
      grid-template-columns:1fr;
    }
  }
</style>

</head>
<body>

  <div id="supProcessing"><i class="fa-solid fa-spinner fa-spin"></i> Processing...</div>

  <!-- Top row -->
  <div class="top-row">
    <div class="title-block">
      <h1>GST-1 Outward</h1>
      <p>View your GST-1 and invoice details</p>
    </div>

    <div class="controls">
      <button id="supBtnNewInvoice" class="btn"><i class="fa-solid fa-plus"></i> New Invoice</button>

      <select id="supSearchCrit" class="select">
        <option value="All">All</option>
        <option value="Customer Name">Customer Name</option>
      </select>

      <input id="supSearchInput" class="input" placeholder="Search... (e.g. customer name)" />

      <button id="supBtnSearch" class="btn ghost small"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
      <button id="supBtnClear" class="btn ghost small"><i class="fa-solid fa-ban"></i> Clear</button>

      <select id="supDatePreset" class="select">
        <option value="all">All Dates</option>
        <option value="1m">Last 1 Month</option>
        <option value="6m">Last 6 Months</option>
        <option value="1y">Last 1 Year</option>
        <option value="custom">Custom Range</option>
      </select>

      <input type="date" id="supFrom" class="input" style="display:none;" />
      <input type="date" id="supTo" class="input" style="display:none;" />
      <button id="supBtnPdf" class="btn"><i class="fa-solid fa-file-pdf"></i> Export PDF</button>
    </div>
  </div>

  <!-- Summary -->
  <div class="summary-card">
    <div>
      <div id="supPeriodLabel" class="period">Invoices for the period ...</div>
      <div style="margin-top:8px;color:var(--muted);font-size:12px;">Showing totals for selected range</div>
    </div>

    <div class="stats">
      <div class="stat-item"><div class="stat-label">Total Taxable Value</div><div id="supTaxableTotal" class="stat-val">Rs. 0.00</div></div>
      <div class="stat-item"><div class="stat-label">Total CGST</div><div id="supCgstTotal" class="stat-val">Rs. 0.00</div></div>
      <div class="stat-item"><div class="stat-label">Total SGST</div><div id="supSgstTotal" class="stat-val">Rs. 0.00</div></div>
      <div class="stat-item"><div class="stat-label">Total Invoice Value</div><div id="supInvoiceTotal" class="stat-val">Rs. 0.00</div></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div id="supTabAbstract" class="tab active">Abstract</div>
    <div id="supTabDetailed" class="tab">Detailed</div>
  </div>

  <!-- Abstract -->
  <div id="supAbstractCard" class="table-card" style="display:block;">
    <div class="pagination" id="supAbstractPagerTop"></div>
    <div id="supAbstractTable">Loading...</div>
    <div class="pagination" id="supAbstractPagerBottom"></div>
  </div>

  <!-- Detailed -->
  <div id="supDetailedCard" class="table-card" style="display:none;margin-top:12px;">
    <div class="pagination" id="supDetailedPagerTop"></div>
    <div id="supDetailedTable">Loading...</div>
    <div class="pagination" id="supDetailedPagerBottom"></div>
  </div>

  <!-- ===== REPLACED: New Invoice Modal (now uses Sites layout grid) ===== -->
  <div class="sup-modal" id="supModalInvoice">
    <h3 id="supInvoiceModalTitle">Add New Invoice</h3>

    <div class="form-grid">
      <div class="form-group">
        <label>Invoice No <span class="req">*</span></label>
        <input id="supInvNo" class="input">
      </div>

      <div class="form-group">
        <label>Invoice Date <span class="req">*</span></label>
        <input id="supInvDate" type="date" class="input">
      </div>

      <div class="form-group">
        <label>Customer Name <span class="req">*</span></label>
        <input id="supCustName" class="input">
      </div>

      <div class="form-group">
        <label>Customer GSTIN</label>
        <input id="supCustGSTIN" class="input">
      </div>

      <div class="form-group full">
        <label>Description of Goods / Services <span class="req">*</span></label>
        <input id="supDesc" class="input">
      </div>

      <div class="form-group">
        <label>Taxable Value (₹)(A) <span class="req">*</span></label>
        <input id="supTaxable" class="input">
      </div>

      <div class="form-group">
        <label>CGST % <span class="req">*</span></label>
        <input id="supCgstPct" class="input" value="9">
      </div>

      <div class="form-group">
        <label>CGST Amt (₹)(B) <span class="req">*</span></label>
        <input id="supCgstAmt" class="input">
      </div>

      <div class="form-group">
        <label>SGST % <span class="req">*</span></label>
        <input id="supSgstPct" class="input" value="9">
      </div>

      <div class="form-group">
        <label>SGST Amt (₹)(C) <span class="req">*</span></label>
        <input id="supSgstAmt" class="input">
      </div>

      <div class="form-group">
        <label>Invoice Value (A+B+C) <span class="req">*</span></label>
        <input id="supInvValue" class="input">
      </div>

      <div class="form-group">
        <label>Place of Supply <span class="req">*</span></label>
        <input id="supPlace" class="input">
      </div>

      <div class="form-group">
        <label>Input Credit Eligible (Yes/No)</label>
        <input id="supInputCredit" class="input">
      </div>

      <div class="form-group full">
        <label>Remarks</label>
        <input id="supRemarks" class="input">
      </div>
    </div>

    <div class="modal-actions">
      <button id="supInvoiceClose" class="btn ghost">Close</button>
      <button id="supInvoiceSave" class="btn">Save</button>
    </div>
  </div>
  <!-- ===== end replaced modal ===== -->

<script>
/* -------------------- State -------------------- */
var sup_masterData = [];
var sup_filteredData = [];
var sup_currentTab = 'abstract';
var sup_rowsPerPage = 25;

/* -------------------- Init -------------------- */
$(document).ready(function(){
  $('#supProcessing').css('display','flex');
  sup_loadData();

  $('#supBtnSearch').on('click', sup_applyFilters);
  $('#supBtnClear').on('click', function(){
    $('#supSearchInput').val('');
    $('#supSearchCrit').val('All');
    $('#supDatePreset').val('all').trigger('change');
    $('#supFrom,#supTo').hide().val('');
    sup_applyFilters();
  });

  $('#supDatePreset').on('change', function(){
    if ($(this).val() === 'custom') $('#supFrom,#supTo').show();
    else { $('#supFrom,#supTo').hide().val(''); sup_applyFilters(); }
  });

  $('#supTabAbstract').on('click', function(){ sup_switchTab('abstract'); });
  $('#supTabDetailed').on('click', function(){ sup_switchTab('detailed'); });

  $('#supBtnPdf').on('click', sup_exportPdf);

// Requirement 7: Set today's date when opening New Invoice modal
  $('#supBtnNewInvoice').on('click', function(){
    clearInvoiceModal();
    var today = new Date().toISOString().split('T')[0];
    $('#supInvDate').val(today); // Set today's date
    $('#supInvoiceModalTitle').text('Add New Invoice');
    supShowModal('supModalInvoice');
    sup_calcGST(); // optional
  });
  $('#supInvoiceClose').on('click', function(){
    supHideModal('supModalInvoice');
    sup_loadData();
  });
  $('#supInvoiceSave').on('click', sup_saveInvoice);
});

/* -------------------- Modal helpers (Sites behavior) -------------------- */
function supShowModal(id){
  var m = document.getElementById(id);
  if(m){ m.style.display='flex'; document.body.style.overflow='hidden'; }
}
function supHideModal(id){
  var m = document.getElementById(id);
  if(m){ m.style.display='none'; document.body.style.overflow=''; }
}

/* -------------------- Server load -------------------- */
function sup_loadData(){
  $('#supProcessing').css('display','flex');
  google.script.run.withSuccessHandler(function(res){
    $('#supProcessing').hide();
    if (res.status === 'ok') {
      sup_masterData = res.rows || [];

      // attempt to coerce numeric-like fields to numbers when possible
      function _sup_toNumberLoose(v){
        if (v === "" || v === null || typeof v === 'undefined') return "";
        var s = String(v).replace(/,/g,'').replace(/\s+/g,'');
        var n = Number(s);
        return isNaN(n) ? v : n;
      }

      sup_masterData.forEach(function(r){
        r['Taxable Value (₹)(A)'] = _sup_toNumberLoose(r['Taxable Value (₹)(A)']);
        r['CGST Amt (₹)(B)'] = _sup_toNumberLoose(r['CGST Amt (₹)(B)']);
        r['SGST Amt (₹)(C)'] = _sup_toNumberLoose(r['SGST Amt (₹)(C)']);
        r['Invoice Value (A+B+C)'] = _sup_toNumberLoose(r['Invoice Value (A+B+C)']);
      });

      sup_applyFilters();
    } else {
      $('#supAbstractTable').html('<div style="color:red;">'+res.message+'</div>');
      $('#supDetailedTable').html('<div style="color:red;">'+res.message+'</div>');
    }
  }).sup_gst1r_getData();
}

/* -------------------- Filters -------------------- */
function sup_applyFilters(){
  $('#supProcessing').css('display','flex');
  var crit = $('#supSearchCrit').val();
  var query = $('#supSearchInput').val().trim().toLowerCase();
  var preset = $('#supDatePreset').val();
  var fromDate = $('#supFrom').val();
  var toDate = $('#supTo').val();

  var now = new Date();
  var startTime = 0;
  if (preset === '1m') startTime = new Date(new Date().setMonth(now.getMonth()-1)).getTime();
  else if (preset === '6m') startTime = new Date(new Date().setMonth(now.getMonth()-6)).getTime();
  else if (preset === '1y') startTime = new Date(new Date().setFullYear(now.getFullYear()-1)).getTime();
  else if (preset === 'custom' && fromDate) startTime = new Date(fromDate).getTime();

  var endTime = Number.MAX_SAFE_INTEGER;
  if (preset === 'custom' && toDate) { var d=new Date(toDate); d.setHours(23,59,59,999); endTime = d.getTime(); }

  sup_filteredData = sup_masterData.filter(function(r){
    if (!r['Invoice No'] && !r['Invoice Date'] && !r['Customer Name']) return false;

    var matchSearch = true;
    if (query) {
      if (crit === 'Customer Name') matchSearch = (String(r['Customer Name']||'').toLowerCase().indexOf(query) !== -1);
      else matchSearch = JSON.stringify(r).toLowerCase().indexOf(query) !== -1;
    }

    var matchDate = true;
    if (startTime > 0 && r['Invoice Date_raw']) matchDate = (r['Invoice Date_raw'] >= startTime);
    if (endTime < Number.MAX_SAFE_INTEGER && r['Invoice Date_raw']) matchDate = matchDate && (r['Invoice Date_raw'] <= endTime);

    return matchSearch && matchDate;
  });

  sup_renderAll();
  $('#supProcessing').hide();
}

/* -------------------- Rendering -------------------- */
function sup_renderAll(){
  sup_renderSummary();
  sup_renderAbstract(1);
  sup_renderDetailed(1);
  sup_updatePeriodLabel();
}

function sup_formatNum(v){ if (v === "" || v === null || typeof v === 'undefined') return ''; var n = Number(v)||0; return n.toFixed(2); }

function sup_renderSummary(){
  var sumTax=0, sumCg=0, sumSg=0, sumInv=0;
  sup_filteredData.forEach(function(r){
    sumTax += Number(r['Taxable Value (₹)(A)'])||0;
    sumCg += Number(r['CGST Amt (₹)(B)'])||0;
    sumSg += Number(r['SGST Amt (₹)(C)'])||0;
    sumInv += Number(r['Invoice Value (A+B+C)'])||0;
  });
  $('#supTaxableTotal').text('Rs. ' + sup_formatNum(sumTax));
  $('#supCgstTotal').text('Rs. ' + sup_formatNum(sumCg));
  $('#supSgstTotal').text('Rs. ' + sup_formatNum(sumSg));
  $('#supInvoiceTotal').text('Rs. ' + sup_formatNum(sumInv));
}

/* Abstract table columns (as per requirement) */
function sup_renderAbstract(page){
  var cols = [
    'Invoice No','Invoice Date','Customer Name','Description of Goods / Services',
    'Taxable Value (₹)(A)','CGST Amt (₹)(B)','SGST Amt (₹)(C)','Invoice Value (A+B+C)'
  ];
  sup_renderTable({ data: sup_filteredData, cols: cols, containerId: 'supAbstractTable',
                    pagerTopId:'supAbstractPagerTop', pagerBottomId:'supAbstractPagerBottom',
                    page:page, rowsPerPage:sup_rowsPerPage, showRowActions:false });
}

/* Detailed table columns (as per requirement) */
function sup_renderDetailed(page){
  var cols = [
    'Year','Invoice Month','Filing Month','Invoice No','Invoice Date','Customer Name','Customer GSTIN',
    'Description of Goods / Services','Taxable Value (₹)(A)','CGST %','CGST Amt (₹)(B)','SGST %','SGST Amt (₹)(C)',
    'Invoice Value (A+B+C)','Place of Supply','Input Credit Eligible (Yes/No)','Remarks'
  ];
  sup_renderTable({ data: sup_filteredData, cols: cols, containerId: 'supDetailedTable',
                    pagerTopId:'supDetailedPagerTop', pagerBottomId:'supDetailedPagerBottom',
                    page:page, rowsPerPage:sup_rowsPerPage, showRowActions:true, rowActionHandlerPrefix:'supDetailed' });
}

/* Generic table renderer with pagination and optional row actions */
function sup_renderTable(opts){
  var data = opts.data || [], cols = opts.cols || [], container = $('#' + opts.containerId);
  var pagerTop = $('#' + opts.pagerTopId), pagerBottom = $('#' + opts.pagerBottomId);
  var page = opts.page || 1, rpp = opts.rowsPerPage || 25, showActions = !!opts.showRowActions;
  var handlerPrefix = opts.rowActionHandlerPrefix || '';

  var totalRows = data.length, totalPages = Math.max(1, Math.ceil(totalRows / rpp));
  if (page < 1) page = 1; if (page > totalPages) page = totalPages;

  // headers
  var html = '<table><thead><tr>';
  html += '<th style="width:45px;">S.No</th>'; // Added S.No with fixed width
  cols.forEach(function(h){ html += '<th>' + h + '</th>'; });
  if (showActions) html += '<th>Actions</th>';
  html += '</tr></thead><tbody>';

  var start = (page-1)*rpp, end = Math.min(totalRows, start + rpp);
  for (var i=start;i<end;i++){
    var row = data[i];
    html += '<tr data-sheet-row="'+(row._row||'')+'">';
    html += '<td style="text-align:center;">' + (i + 1) + '</td>'; // Render the number
    cols.forEach(function(h){
      var val = (typeof row[h] === 'undefined') ? '' : row[h];
      var cls = '';
      if (h === 'Invoice Date') cls = 'center';
      if (h.indexOf('Value') !== -1 || h.indexOf('Amt') !== -1 || h.indexOf('%') !== -1) cls = 'num';

      // Format Invoice Value column to 2 decimals when numeric
      if (h === 'Invoice Value (A+B+C)') {
        if (val === "" || val === null || typeof val === 'undefined') html += '<td class="'+cls+'"></td>';
        else {
          var num = Number(String(val).replace(/[^0-9.-]+/g,''));
          if (!isNaN(num)) html += '<td class="'+cls+'">' + sup_formatNum(num) + '</td>';
          else html += '<td class="'+cls+'">' + val + '</td>';
        }
      } else {
        html += '<td class="'+cls+'">'+(val===null? '': val) + '</td>';
      }
    });

    if (showActions){
      html += '<td class="row-actions">';
      html += '<button class="page-btn small" onclick="'+handlerPrefix+'EditRow(' + i + ')"><i class="fa-solid fa-pen-to-square"></i> Edit</button>';
      html += '<button class="page-btn small" onclick="'+handlerPrefix+'UpdateRow(' + i + ')" style="display:none;" id="'+handlerPrefix+'Update_'+i+'"><i class="fa-solid fa-floppy-disk"></i> Update</button>';
      html += '<button class="page-btn small" onclick="'+handlerPrefix+'CancelEdit(' + i + ')" style="display:none;" id="'+handlerPrefix+'Cancel_'+i+'"><i class="fa-solid fa-xmark"></i> Cancel</button>';
      html += '<button class="page-btn small" onclick="'+handlerPrefix+'DeleteRow(' + i + ')"><i class="fa-solid fa-trash"></i> Delete</button>';
      html += '</td>';
    }

    html += '</tr>';
  }

  if (start >= end) {
    html += '<tr><td colspan="'+(cols.length + (showActions?1:0))+'" style="text-align:center;padding:20px;">No matching records found</td></tr>';
  }

  html += '</tbody></table>';
  container.html(html);

  // pagers
  function buildPager(pagerElem){
    pagerElem.empty();
    if (totalPages <= 1) return;
    var prev = $('<div class="page-btn">Prev</div>').on('click', function(){ if(page>1){ if (opts.containerId==='supAbstractTable') sup_renderAbstract(page-1); else sup_renderDetailed(page-1);} });
    pagerElem.append(prev);
    var startP = Math.max(1, page-2), endP = Math.min(totalPages, page+2);
    for (var p=startP;p<=endP;p++){
      var b = $('<div class="page-btn '+(p===page?'active':'')+'">'+p+'</div>').on('click', (function(pp){ return function(){ if (opts.containerId==='supAbstractTable') sup_renderAbstract(pp); else sup_renderDetailed(pp); }; })(p));
      pagerElem.append(b);
    }
    var next = $('<div class="page-btn">Next</div>').on('click', function(){ if(page<totalPages){ if (opts.containerId==='supAbstractTable') sup_renderAbstract(page+1); else sup_renderDetailed(page+1);} });
    pagerElem.append(next);
    pagerElem.append('<div style="margin-left:8px;color:var(--muted);">Showing ' + (totalRows>0? (start+1) + '-' + end : '0') + ' of ' + totalRows + '</div>');
  }
  buildPager(pagerTop); buildPager(pagerBottom);
}

/* -------------------- Detailed row actions (edit/update/cancel/delete) -------------------- */

// Requirement 2: Prevent editing multiple rows
var isEditingRow = false;

function supDetailedEditRow(idx) {
  if (isEditingRow) {
    alert("Please save or cancel the current row edit first.");
    return;
  }

  var row = sup_filteredData[idx];
  var tr = $('#supDetailedTable tr[data-sheet-row="' + row._row + '"]');
  var tds = tr.find('td');

  // These indices match the Detailed Table + S.No Column:
  // 4:InvNo(D), 5:Date(E), 6:Name(F), 7:GSTIN(G), 8:Desc(H), 9:Taxable(I)
  // 15:Place(O), 16:Credit(P), 17:Remarks(Q)
  var editableIndices = [4, 5, 6, 7, 8, 9, 15, 16, 17];

  editableIndices.forEach(function(colIdx) {
    var cell = tds.eq(colIdx);
    var currentVal = cell.text().trim();
    var type = (colIdx === 9) ? 'number' : 'text'; // Taxable Value as number
    cell.html('<input type="'+type+'" class="input small-edit" value="' + currentVal + '" style="width:90%">');
  });

  tr.find('.row-actions button').hide();
  $('#supDetailedUpdate_' + idx).show();
  $('#supDetailedCancel_' + idx).show();
  isEditingRow = true;
}

function supDetailedUpdateRow(idx) {
  var row = sup_filteredData[idx];
  var tr = $('#supDetailedTable tr[data-sheet-row="' + row._row + '"]');
  var inputs = tr.find('input');

  // Mapping inputs to the specific keys the GS function expects
  var updates = {
    'Invoice No': inputs.eq(0).val(),
    'Invoice Date': inputs.eq(1).val(),
    'Customer Name': inputs.eq(2).val(),
    'Customer GSTIN': inputs.eq(3).val(),
    'Description of Goods / Services': inputs.eq(4).val(),
    'Taxable Value (₹)(A)': inputs.eq(5).val(),
    'Place of Supply': inputs.eq(6).val(),
    'Input Credit Eligible (Yes/No)': inputs.eq(7).val(),
    'Remarks': inputs.eq(8).val()
  };

  if (!updates['Invoice No'] || !updates['Invoice Date'] || !updates['Customer Name']) {
    alert("Mandatory fields missing.");
    return;
  }

  $('#supProcessing').show();
  google.script.run.withSuccessHandler(function(res) {
    $('#supProcessing').hide();
    if (res.status === 'ok') {
      isEditingRow = false;
      sup_loadData(); 
    } else {
      alert(res.message);
    }
  }).sup_gst1r_updateRow(row._row, updates);
}

function supDetailedCancelEdit(idx) {
  isEditingRow = false;
  sup_renderDetailed(1); // Re-render to clear inputs
}

function supDetailedDeleteRow(idx){
  var rowObj = sup_filteredData[idx]; if(!rowObj) return alert('Row not available.');
  if (!confirm('Delete this row from sheet? This action cannot be undone.')) return;
  var sheetRow = rowObj._row;
  $('#supProcessing').css('display','flex');
  google.script.run.withSuccessHandler(function(res){
    $('#supProcessing').hide();
    if (res.status === 'ok') sup_loadData();
    else alert('Delete failed: ' + res.message);
  }).sup_gst1r_deleteRow(sheetRow);
}

window.supDetailedEditRow = supDetailedEditRow;
window.supDetailedUpdateRow = supDetailedUpdateRow;
window.supDetailedCancelEdit = supDetailedCancelEdit;
window.supDetailedDeleteRow = supDetailedDeleteRow;

/* -------------------- Tab switch -------------------- */
function sup_switchTab(t){
  sup_currentTab = t;
  if (t === 'abstract') {
    $('#supTabAbstract').addClass('active'); $('#supTabDetailed').removeClass('active');
    $('#supAbstractCard').show(); $('#supDetailedCard').hide();
  } else {
    $('#supTabDetailed').addClass('active'); $('#supTabAbstract').removeClass('active');
    $('#supAbstractCard').hide(); $('#supDetailedCard').show();
  }
}

/* -------------------- Period label -------------------- */
function sup_updatePeriodLabel(){
  var preset = $('#supDatePreset').val();
  var label = '';
  if (preset === 'custom') {
    var f = $('#supFrom').val() || 'Start'; var t = $('#supTo').val() || (new Date()).toLocaleDateString();
    label = 'Invoices for the period ' + f + ' to ' + t;
  } else {
    if (sup_filteredData.length > 0) {
      var temp = sup_filteredData.slice().sort(function(a,b){ return (a['Invoice Date_raw']||0) - (b['Invoice Date_raw']||0); });
      var earliest = temp[0]['Invoice Date'] || '';
      var today = new Date(); var todayStr = today.getDate() + '-' + today.toLocaleString('default', { month: 'short'}) + '-' + today.getFullYear();
      label = 'Invoices for the period ' + earliest + ' to ' + todayStr;
    } else label = 'No data found for this period';
  }
  $('#supPeriodLabel').text(label);
}

/* -------------------- Export PDF -------------------- */
function sup_exportPdf(){
  var meta = {
    dateRange: $('#supPeriodLabel').text(),
    totals: {
      taxable: $('#supTaxableTotal').text(), cgst: $('#supCgstTotal').text(),
      sgst: $('#supSgstTotal').text(), invoice: $('#supInvoiceTotal').text()
    }
  };
  $('#supProcessing').css('display','flex');
  google.script.run.withSuccessHandler(function(url){
    $('#supProcessing').hide();
    if (url) window.open(url, '_blank');
  }).sup_gst1r_exportPdf(sup_filteredData, meta);
}

/* -------------------- New Invoice: clear & save -------------------- */
function clearInvoiceModal(){
  $('#supInvNo').val(''); $('#supInvDate').val('');
  $('#supCustName').val(''); $('#supCustGSTIN').val(''); $('#supDesc').val('');
  $('#supTaxable').val(''); $('#supCgstPct').val('9'); $('#supCgstAmt').val('');
  $('#supSgstPct').val('9'); $('#supSgstAmt').val(''); $('#supInvValue').val('');
  $('#supPlace').val(''); $('#supInputCredit').val(''); $('#supRemarks').val('');
}

function sup_saveInvoice(){
  var invNo = $('#supInvNo').val().trim();
  var invDate = $('#supInvDate').val();
  var custName = $('#supCustName').val().trim();
  var custGSTIN = $('#supCustGSTIN').val().trim();
  var desc = $('#supDesc').val().trim();
  var taxable = $('#supTaxable').val().trim();
  var cgstPct = $('#supCgstPct').val().trim();
  var cgstAmt = $('#supCgstAmt').val().trim();
  var sgstPct = $('#supSgstPct').val().trim();
  var sgstAmt = $('#supSgstAmt').val().trim();
  var invValue = $('#supInvValue').val().trim();
  var place = $('#supPlace').val().trim();
  var inputCredit = $('#supInputCredit').val().trim();
  var remarks = $('#supRemarks').val().trim();

  // validation (required fields)
  var missing = [];
  if (!invNo) missing.push('Invoice No');
  if (!invDate) missing.push('Invoice Date');
  if (!custName) missing.push('Customer Name');
  if (!desc) missing.push('Description');
  if (!taxable) missing.push('Taxable Value (A)');
  if (!cgstPct) missing.push('CGST %');
  if (!cgstAmt) missing.push('CGST Amt (B)');
  if (!sgstPct) missing.push('SGST %');
  if (!sgstAmt) missing.push('SGST Amt (C)');
  if (!invValue) missing.push('Invoice Value');
  if (!place) missing.push('Place of Supply');

  if (missing.length > 0) { alert('Please fill required fields: ' + missing.join(', ')); return; }

  var payload = {
    'Invoice No': invNo,
    'Invoice Date': invDate,
    'Customer Name': custName,
    'Customer GSTIN': custGSTIN,
    'Description of Goods / Services': desc,
    'Taxable Value (₹)(A)': taxable,
    'Place of Supply': place,
    'Input Credit Eligible (Yes/No)': inputCredit,
    'Remarks': remarks
  };

  $('#supProcessing').css('display','flex');
  google.script.run.withSuccessHandler(function(res){
    $('#supProcessing').hide();
    if (res.status === 'ok') {
      alert('New Invoice Added');
      supHideModal('supModalInvoice');
      sup_loadData();
    } else {
      alert('Save failed: ' + res.message);
    }
  }).sup_gst1r_addInvoice(payload);
}

function sup_round2(num){
  return Math.round((parseFloat(num) + Number.EPSILON) * 100) / 100;
}

function sup_calcGST(){

  var taxable = parseFloat($('#supTaxable').val()) || 0;

  var cgstPct = parseFloat($('#supCgstPct').val()) || 0;
  var sgstPct = parseFloat($('#supSgstPct').val()) || 0;

  var cgstAmt = sup_round2((taxable * cgstPct) / 100);
  var sgstAmt = sup_round2((taxable * sgstPct) / 100);

  // only auto fill if user hasn't typed something else
  if(!$('#supCgstAmt').data('manual')){
    $('#supCgstAmt').val(cgstAmt.toFixed(2));
  }

  if(!$('#supSgstAmt').data('manual')){
    $('#supSgstAmt').val(sgstAmt.toFixed(2));
  }

  var invVal = sup_round2(taxable + cgstAmt + sgstAmt);

  if(!$('#supInvValue').data('manual')){
    $('#supInvValue').val(invVal.toFixed(2));
  }
}
$('#supCgstAmt').on('input', function(){
  $(this).data('manual', true);
});

$('#supSgstAmt').on('input', function(){
  $(this).data('manual', true);
});

$('#supInvValue').on('input', function(){
  $(this).data('manual', true);
});
$('#supTaxable, #supCgstPct, #supSgstPct').on('input', function(){
  sup_calcGST();
});

</script>
