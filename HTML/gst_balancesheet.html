<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <title>Balance Sheet</title>

  <!-- Fonts & icons (same stack used across modules) -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Roboto:wght@300;400;500&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

  <style>
    :root { --teal:#dca612; --muted:#8a8f98; --bg:#f7fafb; --card:#fff; --danger:#d32f2f; }
    body { font-family: Poppins, Roboto, Montserrat, sans-serif; margin:16px; background:var(--bg); color:#222; }
    .top-row { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
    .heading h1{margin:0;font-size:20px;} .small{font-size:13px;color:var(--muted);}
    .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
    .btn{background:var(--teal);color:#fff;padding:8px 12px;border-radius:8px;border:none;cursor:pointer;font-weight:600;}
    .btn.ghost{background:#fff;color:var(--teal);border:1px solid rgba(15,181,163,0.12);}
    .select,.input{padding:8px 10px;border-radius:8px;border:1px solid #e7ecec;background:#fff;}
    .card{background:var(--card);border-radius:10px;padding:12px;box-shadow:0 6px 18px rgba(8,14,18,0.04);margin-bottom:12px;}
    .stat-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
    .stat { background:#f8faf9; padding:12px;border-radius:8px; min-width:170px; }
    .stat .label{color:var(--muted);font-size:12px;}
    .stat .val{font-size:18px;font-weight:700;margin-top:6px;}
    .tx-table-scroll{width:100%;overflow-x:auto;}
    table{width:100%;border-collapse:collapse;min-width:500px;font-size:13px;}
    table th, table td{padding:8px 10px;border-bottom:1px solid #eef2f3;text-align:left;vertical-align:middle;}
    table thead th{ text-align:center; font-weight:700; background:#fbfefe; }
    .action-btn{border:none;background:transparent;cursor:pointer;margin-right:6px;color:var(--teal);font-size:14px;}
    .editable-input{width:100%;padding:6px;border-radius:6px;border:1px solid #dfe6e6;box-sizing:border-box;}
    .field-error{color:var(--danger);font-size:12px;margin-top:4px;}
    .input-error{border:1px solid var(--danger) !important;background:#fff5f5;}
    .pagination{display:flex;gap:6px;align-items:center;margin-top:8px;}
    .page-btn{padding:6px 10px;border-radius:6px;border:1px solid #eef2f3;background:#fff;cursor:pointer;}
    .sup-modal{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:none;align-items:center;justify-content:center;z-index:2100;}
    .sup-modal-box{background:#fff;border-radius:10px;padding:18px;width:520px;max-width:96%;max-height:90vh;overflow:auto;}
    #supProcessing{position:fixed;inset:0;display:none;background:rgba(0,0,0,0.35);align-items:center;justify-content:center;z-index:3000;}
    #supProcessing .box{background:#fff;padding:16px 20px;border-radius:8px;display:flex;gap:10px;align-items:center;}
    tr.editing{background:#f0fbfa;}
    a.link-like{color:var(--teal);text-decoration:none;cursor:pointer;}
    @media (max-width:600px){ .controls{flex-wrap:wrap;} .stat-row{flex-direction:column;align-items:flex-start;} table{min-width:900px;} }
  </style>
</head>
<body>

  <!-- Header + controls -->
  <div class="top-row">
    <div>
      <h1>Balance Sheet</h1>
      <p class="small">View your Balance Sheet</p>
    </div>

    <div class="controls">
      <button class="btn" id="supBtnNewAsset"><i class="fa-solid fa-plus"></i> New Asset</button>

      <select id="supSearchCriteria" class="select">
        <option value="All">All</option>
        <option value="Liability (Credit)">Liability (Credit)</option>
        <option value="Asset (Debit)">Asset (Debit)</option>
      </select>

      <input id="supSearchQuery" class="input" placeholder="Search..." />
      <button class="btn ghost" id="supBtnSearch">Search</button>
      <button class="btn ghost" id="supBtnClear">Clear</button>

      <!-- Date presets (keeps pattern consistent with other modules) -->
      <select id="supDatePreset" class="select">
        <option value="all">All</option>
        <option value="1m">Last 1 Month</option>
        <option value="6m">Last 6 Months</option>
        <option value="1y">Last 1 Year</option>
        <option value="custom">Custom Range</option>
      </select>
      <input type="date" id="supFromDate" class="input" disabled>
      <input type="date" id="supToDate" class="input" disabled>

      <button class="btn ghost" id="supBtnExportPdf"><i class="fa-solid fa-file-pdf"></i> Export PDF</button>
    </div>
  </div>

  <!-- Summary: Balance Sheet As on {date} and totals -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;">
      <div><strong>Balance Sheet As on </strong><span id="supAsOnDate"></span></div>
      <div class="stat-row">
        <div class="stat">
          <div class="label">Total Liability</div>
          <div class="val" id="supTotalLiability">Rs. 0.00</div>
        </div>
        <div class="stat">
          <div class="label">Total Asset</div>
          <div class="val" id="supTotalAsset">Rs. 0.00</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Table card -->
  <div class="card">
    <div class="pagination" id="supPaginationTop"></div>
    <div id="supTableContainer">Loading balance sheet...</div>
    <div class="pagination" id="supPagination"></div>
  </div>

  <!-- New Asset Modal -->
  <div class="sup-modal" id="supModalAsset">
    <div class="sup-modal-box">
      <h3>Add New Asset</h3>

      <div style="margin-top:8px;">
        <label>Asset category <span style="color:red">*</span></label>
        <input id="supAssetCategory" class="input">
      </div>

      <div style="margin-top:8px;">
        <label>Amount <span style="color:red">*</span></label>
        <input id="supAssetAmount" type="number" step="0.01" class="input">
      </div>

      <div style="margin-top:12px;text-align:right;">
        <button class="btn ghost" id="supAssetClose">Close</button>
        <button class="btn" id="supAssetSave">Save</button>
      </div>
    </div>
  </div>

  <!-- Delete confirm modal (simple) -->
  <div class="sup-modal" id="supDeleteConfirm">
    <div class="sup-modal-box">
      <h3>Confirm Delete</h3>
      <p>Are you sure you want to delete this row?</p>
      <div style="text-align:right;margin-top:12px;">
        <button class="btn ghost" id="supDeleteCancel">Cancel</button>
        <button class="btn" id="supDeleteConfirmBtn">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Processing overlay (identical to other modules) -->
  <div id="supProcessing"><div class="box"><i class="fa-solid fa-spinner fa-spin"></i><div>Processing...</div></div></div>

<script>
/* --------------------- Utilities (same patterns) --------------------- */
function supShowProcessing(){ document.getElementById('supProcessing').style.display='flex'; }
function supHideProcessing(){ document.getElementById('supProcessing').style.display='none'; }
function supShowModal(id){ var m=document.getElementById(id); if(m){ m.style.display='flex'; document.body.style.overflow='hidden'; } }
function supHideModal(id){ var m=document.getElementById(id); if(m){ m.style.display='none'; document.body.style.overflow=''; } }

function showFieldError(inputEl,message){ clearFieldError(inputEl); if(!inputEl) return; inputEl.classList.add('input-error'); var err=document.createElement('div'); err.className='field-error'; err.innerText=message; inputEl.parentNode.appendChild(err); }
function clearFieldError(inputEl){ if(!inputEl) return; inputEl.classList.remove('input-error'); var errs=inputEl.parentNode.querySelectorAll('.field-error'); errs.forEach(e=>e.remove()); }
function clearAllErrors(container){ if(!container) return; container.querySelectorAll('.input-error').forEach(el=>el.classList.remove('input-error')); container.querySelectorAll('.field-error').forEach(el=>el.remove()); }

/* -------------------- State -------------------- */
var supRows = [];        // all rows returned from server (objects keyed by headers)
var supFiltered = [];    // filtered rows used for display
var supPerPage = 25;
var supCurrentPage = 1;
var supRowToDelete = null; // sheet row number for delete confirmation
var supDateFilterActive = false;

/* -------------------- Init -------------------- */
function supInit(){
  // wire UI
  document.getElementById('supBtnNewAsset').addEventListener('click', function(){
    document.getElementById('supAssetCategory').value=''; document.getElementById('supAssetAmount').value='';
    supShowModal('supModalAsset');
  });
  document.getElementById('supAssetClose').addEventListener('click', ()=>supHideModal('supModalAsset'));
  document.getElementById('supAssetSave').addEventListener('click', supSaveAsset);

  document.getElementById('supBtnSearch').addEventListener('click', supSearch);
  document.getElementById('supBtnClear').addEventListener('click', function(){
    document.getElementById('supSearchQuery').value=''; document.getElementById('supSearchCriteria').value='All';
    supFiltered = supRows.slice(); supCurrentPage = 1; supRenderTable();
  });

  document.getElementById('supDatePreset').addEventListener('change', supApplyDateFilter);
  document.getElementById('supFromDate').addEventListener('change', supApplyDateFilter);
  document.getElementById('supToDate').addEventListener('change', supApplyDateFilter);

  document.getElementById('supBtnExportPdf').addEventListener('click', supExportPdf);

  // delete confirm
  document.getElementById('supDeleteCancel').addEventListener('click', function(){ supRowToDelete = null; supHideModal('supDeleteConfirm'); });
  document.getElementById('supDeleteConfirmBtn').addEventListener('click', function(){ if(supRowToDelete) supConfirmDeleteNow(supRowToDelete); });

  // initial load
  supLoadBalanceSheet();
}

/* -------------------- Server calls -------------------- */
function supLoadBalanceSheet(){
  supShowProcessing();
  google.script.run.withSuccessHandler(function(res){
    supHideProcessing();
    if(!res || !Array.isArray(res)){ document.getElementById('supTableContainer').innerText = 'No data or named range missing.'; return; }
    // rows include __row property (sheet row number) from server
    supRows = res;
    supFiltered = supRows.slice();
    supCurrentPage = 1;
    document.getElementById('supAsOnDate').innerText = new Date().toLocaleDateString();
    supRenderTable();
  }).sup_getBalanceSheet();
}

/* -------------------- Add Asset -------------------- */
function supSaveAsset(){
  var cat = document.getElementById('supAssetCategory').value.trim();
  var amt = document.getElementById('supAssetAmount').value.trim();
  var modal = document.getElementById('supModalAsset');
  clearAllErrors(modal);
  var valid = true;
  if(!cat){ showFieldError(document.getElementById('supAssetCategory'),'Asset category required'); valid=false; }
  if(!amt || isNaN(Number(amt))){ showFieldError(document.getElementById('supAssetAmount'),'Amount required'); valid=false; }
  if(!valid) return;

  // Build object mapped to sheet headers
  // ASSUMPTION: Asset category will be saved into "Asset (Debit)" column and amount to "Asset Amount"
  var obj = { "Asset (Debit)": cat, "Asset Amount": Number(amt) };

  supShowProcessing();
  google.script.run.withSuccessHandler(function(res){
    supHideProcessing();
    if(res && res.status === 'ok'){
      alert('New Asset Category Added');
      supHideModal('supModalAsset');
      supLoadBalanceSheet();
    } else {
      alert('Error: ' + (res && res.message ? res.message : 'Unknown'));
    }
  }).sup_addBalanceAsset(obj);
}

/* -------------------- Render Table & Pagination -------------------- */
function supRenderTable(){
  var container = document.getElementById('supTableContainer');
  if(!supFiltered || supFiltered.length === 0){
    container.innerHTML = '<div class="small">No records found.</div>';
    document.getElementById('supPagination').innerHTML=''; document.getElementById('supPaginationTop').innerHTML='';
    document.getElementById('supTotalLiability').innerText = 'Rs. 0.00';
    document.getElementById('supTotalAsset').innerText = 'Rs. 0.00';
    return;
  }

  var total = supFiltered.length;
  var pages = Math.ceil(total / supPerPage);
  if(supCurrentPage > pages) supCurrentPage = 1;
  var start = (supCurrentPage - 1) * supPerPage;
  var end = Math.min(start + supPerPage, total);
  var pageRows = supFiltered.slice(start, end);

  // columns: S.No, Liability (Credit), Liability Amount, Asset (Debit), Asset Amount
  var cols = [
    {h:'S.No', key:'S.No', w:'5%'},
    {h:'Liability (Credit)', key:'Liability (Credit)', w:'30%'},
    {h:'Liability Amount', key:'Liability Amount', w:'15%'},
    {h:'Asset (Debit)', key:'Asset (Debit)', w:'30%'},
    {h:'Asset Amount', key:'Asset Amount', w:'15%'},
    {h:'Action', key:'__action', w:'5%'}
  ];

  var html = '<div class="tx-table-scroll"><table><thead><tr>';
  cols.forEach(function(c){ html += '<th style="width:'+c.w+'">'+c.h+'</th>'; });
  html += '</tr></thead><tbody>';

  for(var i=0;i<pageRows.length;i++){
    var r = pageRows[i];
    var displayIndex = start + i + 1;
    html += '<tr data-row="'+(r.__row||'')+'">';
    html += '<td style="text-align:center;">' + (r['S.No'] || displayIndex) + '</td>';
    html += '<td>' + (r['Liability (Credit)'] || '') + '</td>';
    html += '<td style="text-align:right;">' + (r['Liability Amount'] !== undefined && r['Liability Amount'] !== '' ? Number(r['Liability Amount']).toFixed(2) : '') + '</td>';
    html += '<td>' + (r['Asset (Debit)'] || '') + '</td>';
    html += '<td style="text-align:right;">' + (r['Asset Amount'] !== undefined && r['Asset Amount'] !== '' ? Number(r['Asset Amount']).toFixed(2) : '') + '</td>';
    html += '<td>';
    html += '<button class="action-btn" title="Edit" onclick="supEditRow(this)"><i class="fa-solid fa-pen-to-square"></i></button>';
    html += '<button class="action-btn" title="Delete" onclick="supAskDelete(this)"><i class="fa-solid fa-trash"></i></button>';
    html += '</td>';
    html += '</tr>';
  }

  html += '</tbody></table></div>';

  container.innerHTML = html;

  // totals (sum over the currently filtered rows)
  var totalLiab = 0;
  var totalAsset = 0;
  supFiltered.forEach(function(rr){
    var la = parseFloat(rr['Liability Amount']) || 0;
    var aa = parseFloat(rr['Asset Amount']) || 0;
    totalLiab += la;
    totalAsset += aa;
  });
  document.getElementById('supTotalLiability').innerText = 'Rs. ' + totalLiab.toFixed(2);
  document.getElementById('supTotalAsset').innerText = 'Rs. ' + totalAsset.toFixed(2);

  // pagination
  var pgHtml = '';
  if(pages > 1){
    if(supCurrentPage > 1) pgHtml += '<button class="page-btn" onclick="supGotoPage('+(supCurrentPage-1)+')">Prev</button>';
    pgHtml += '<span class="small">Page ' + supCurrentPage + ' of ' + pages + '</span>';
    if(supCurrentPage < pages) pgHtml += '<button class="page-btn" onclick="supGotoPage('+(supCurrentPage+1)+')">Next</button>';
  }
  document.getElementById('supPagination').innerHTML = pgHtml;
  document.getElementById('supPaginationTop').innerHTML = pgHtml;
}

function supGotoPage(p){ supCurrentPage = p; supRenderTable(); }

/* -------------------- Search -------------------- */
function supSearch(){
  var crit = document.getElementById('supSearchCriteria').value;
  var q = document.getElementById('supSearchQuery').value.trim().toLowerCase();
  supShowProcessing();
  setTimeout(function(){
    if(!q){
      supFiltered = supRows.slice();
    } else if(crit === 'All'){
      supFiltered = supRows.filter(function(row){
        return Object.keys(row).some(function(k){
          var v = row[k];
          return (v !== undefined && String(v || '').toLowerCase().indexOf(q) !== -1);
        });
      });
    } else {
      supFiltered = supRows.filter(function(row){
        var cell = (row[crit] || '') + '';
        return cell.toString().toLowerCase().indexOf(q) !== -1;
      });
    }
    supHideProcessing();
    if(supFiltered.length === 0) { alert('No matching data found'); }
    supCurrentPage = 1;
    supRenderTable();
  },150);
}

/* -------------------- Date Filter (works only if Date column exists) -------------------- */
function supApplyDateFilter(){
  var now = new Date();
  var fromVal = document.getElementById('supFromDate').value;
  var toVal = document.getElementById('supToDate').value;
  var fromDate = null; var toDate = null;
  var preset = document.getElementById('supDatePreset').value;

  var fromInput = document.getElementById('supFromDate'); var toInput = document.getElementById('supToDate');
  fromInput.disabled = preset !== 'custom'; toInput.disabled = preset !== 'custom';

  if(preset === 'all'){ supFiltered = supRows.slice(); supDateFilterActive = false; supCurrentPage = 1; supRenderTable(); return;}
  if(preset !== 'custom'){
    toDate = now;
    fromDate = new Date(now);
    if(preset === '1m') fromDate.setMonth(now.getMonth()-1);
    if(preset === '6m') fromDate.setMonth(now.getMonth()-6);
    if(preset === '1y') fromDate.setFullYear(now.getFullYear()-1);
  } else if(fromVal || toVal){
    fromDate = fromVal ? new Date(fromVal) : null;
    toDate = toVal ? new Date(toVal) : null;
  } else return;

  // filter based on any 'Date' field present in rows (if none, result will be empty)
  supFiltered = supRows.filter(function(r){
    // tries various date field names — best effort
    var dval = r['Date'] || r['On Date'] || r['As On'] || '';
    if(!dval) return false;
    var d = new Date(dval);
    if(isNaN(d)) return false;
    if(fromDate && d < fromDate) return false;
    if(toDate && d > toDate) return false;
    return true;
  });
  supDateFilterActive = true;
  supCurrentPage = 1;
  supRenderTable();
}

/* -------------------- Inline Edit / Update / Cancel -------------------- */
function supEditRow(btn){
  if(document.querySelector('tr.editing')){ alert('Finish editing current row'); return; }
  var tr = btn.closest('tr'); tr.classList.add('editing');
  var rowSheet = tr.getAttribute('data-row');
  if(!rowSheet){ alert('Missing row id'); return; }
  // find row object
  var rowObj = supRows.find(function(r){ return String(r.__row) === String(rowSheet); });
  if(!rowObj) return;

  // Build editable cells for Asset (Debit) and Asset Amount only
  var cells = tr.children;
  // S.No (keep), Liability (Credit, readonly), Liability Amount (readonly)
  var sno = cells[0].innerText;
  var liab = rowObj['Liability (Credit)'] || '';
  var liabAmt = rowObj['Liability Amount'] !== undefined && rowObj['Liability Amount'] !== '' ? Number(rowObj['Liability Amount']).toFixed(2) : '';
  var asset = rowObj['Asset (Debit)'] || '';
  var assetAmt = rowObj['Asset Amount'] !== undefined && rowObj['Asset Amount'] !== '' ? Number(rowObj['Asset Amount']).toFixed(2) : '';

  var editHtml = '';
  editHtml += '<td style="text-align:center;">'+sno+'</td>';
  editHtml += '<td>'+escapeHtml(liab)+'</td>';
  editHtml += '<td style="text-align:right;">'+liabAmt+'</td>';
  editHtml += '<td><input id="sup_edit_Asset_'+rowSheet+'" class="editable-input" value="'+escapeHtml(asset)+'"></td>';
  editHtml += '<td><input id="sup_edit_AssetAmt_'+rowSheet+'" class="editable-input" type="number" step="0.01" value="'+assetAmt+'"></td>';
  editHtml += '<td class="action-buttons-row"><button class="btn" onclick="supUpdateRow(\''+rowSheet+'\')">Update</button><button class="btn ghost" onclick="supCancelEdit(\''+rowSheet+'\')">Cancel</button></td>';
  tr.innerHTML = editHtml;

  // disable other action buttons
  document.querySelectorAll('.action-btn').forEach(function(b){ b.disabled=true; b.style.opacity='0.4'; b.style.pointerEvents='none'; });
}

function supCancelEdit(rowSheet){
  // reload to restore
  supLoadBalanceSheet();
  document.querySelectorAll('.action-btn').forEach(function(b){ b.disabled=false; b.style.opacity=''; b.style.pointerEvents=''; });
}

function supUpdateRow(rowSheet){
  var assetVal = document.getElementById('sup_edit_Asset_'+rowSheet).value.trim();
  var assetAmtVal = document.getElementById('sup_edit_AssetAmt_'+rowSheet).value.trim();
  var tr = document.querySelector('tr[data-row="'+rowSheet+'"]');
  clearAllErrors(tr);
  var valid=true;
  if(!assetVal){ showFieldError(document.getElementById('sup_edit_Asset_'+rowSheet),'Asset required'); valid=false; }
  if(assetAmtVal === '' || isNaN(Number(assetAmtVal))){ showFieldError(document.getElementById('sup_edit_AssetAmt_'+rowSheet),'Amount required'); valid=false; }
  if(!valid) return;

  var updated = { "Asset (Debit)": assetVal, "Asset Amount": Number(assetAmtVal) };

  supShowProcessing();
  google.script.run.withSuccessHandler(function(res){
    supHideProcessing();
    if(res && res.status === 'ok'){
      alert('Asset Details Updated');
      supLoadBalanceSheet();
      document.querySelectorAll('.action-btn').forEach(function(b){ b.disabled=false; b.style.opacity=''; b.style.pointerEvents=''; });
    } else {
      alert('Error: ' + (res && res.message ? res.message : 'Unknown'));
    }
  }).sup_updateBalanceByRow(Number(rowSheet), updated);
}

/* -------------------- Delete flow -------------------- */
function supAskDelete(btn){
  var tr = btn.closest('tr'); var rowSheet = tr.getAttribute('data-row');
  if(!rowSheet) return;
  supRowToDelete = Number(rowSheet);
  supShowModal('supDeleteConfirm');
}

function supConfirmDeleteNow(rowSheet){
  supHideModal('supDeleteConfirm');
  supShowProcessing();
  google.script.run.withSuccessHandler(function(res){
    supHideProcessing();
    if(res && res.status === 'ok'){
      alert('Deleted');
      supLoadBalanceSheet();
    } else {
      alert('Error: ' + (res && res.message ? res.message : 'Unable to delete'));
    }
    supRowToDelete = null;
  }).sup_deleteBalanceByRow(Number(rowSheet));
}

/* -------------------- Export PDF -------------------- */
function supExportPdf(){
  if(!supFiltered || supFiltered.length === 0){ alert('No data to export'); return; }

  var meta = {
    company: '', // optional
    dateRange: getActiveDateRangeLabel()
  };

  supShowProcessing();
  google.script.run.withSuccessHandler(function(url){
    supHideProcessing();
    if(url) window.open(url,'_blank');
    else alert('PDF generation failed');
  }).sup_exportBalancePdf(supFiltered, meta);
}

function getActiveDateRangeLabel(){
  var preset = document.getElementById('supDatePreset').value;
  var from = document.getElementById('supFromDate').value;
  var to = document.getElementById('supToDate').value;
  if(preset === '1m') return 'Last 1 Month';
  if(preset === '6m') return 'Last 6 Months';
  if(preset === '1y') return 'Last 1 Year';
  if(preset === 'custom') return 'From ' + (from||'start') + ' to ' + (to||'today');
  return 'All Dates';
}

/* -------------------- Helpers -------------------- */
function escapeHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* -------------------- Init on load -------------------- */
supInit();
</script>
</body>
</html>
