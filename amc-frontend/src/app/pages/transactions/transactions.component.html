<div class="page-header">
  <h2>Transactions</h2>
  <button mat-raised-button color="primary">
    <mat-icon>add</mat-icon> Add Transaction
  </button>
</div>

<mat-card>
  <mat-card-content>
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search transactions</mat-label>
      <input matInput [(ngModel)]="searchText" (keyup)="applyFilter()" placeholder="Site, nature, party...">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

    <div class="table-responsive">
      <table mat-table [dataSource]="dataSource" matSort class="full-width">

        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Date</th>
          <td mat-cell *matCellDef="let row">{{ row.date }}</td>
        </ng-container>

        <ng-container matColumnDef="transactionId">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Txn ID</th>
          <td mat-cell *matCellDef="let row" class="txn-id">{{ row.transactionId }}</td>
        </ng-container>

        <ng-container matColumnDef="siteName">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Site</th>
          <td mat-cell *matCellDef="let row">{{ row.siteName }}</td>
        </ng-container>

        <ng-container matColumnDef="type">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Type</th>
          <td mat-cell *matCellDef="let row">
            <span class="type-chip" [ngClass]="getTypeClass(row.type)">{{ row.type }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="nature">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Nature</th>
          <td mat-cell *matCellDef="let row">{{ row.nature }}</td>
        </ng-container>

        <ng-container matColumnDef="amount">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Amount</th>
          <td mat-cell *matCellDef="let row" class="amount-cell">₹{{ row.amount | number }}</td>
        </ng-container>

        <ng-container matColumnDef="party">
          <th mat-header-cell *matHeaderCellDef>Party</th>
          <td mat-cell *matCellDef="let row">{{ row.party }}</td>
        </ng-container>

        <ng-container matColumnDef="modeOfPayment">
          <th mat-header-cell *matHeaderCellDef>Mode</th>
          <td mat-cell *matCellDef="let row">{{ row.modeOfPayment }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let row">
            <button mat-icon-button color="primary" matTooltip="Edit"><mat-icon>edit</mat-icon></button>
            <button mat-icon-button color="warn" matTooltip="Delete" (click)="deleteRow(row.id)"><mat-icon>delete</mat-icon></button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" [colSpan]="displayedColumns.length" style="text-align:center; padding:24px;">
            No transactions found.
          </td>
        </tr>
      </table>
    </div>
    <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons></mat-paginator>
  </mat-card-content>
</mat-card>
