<div class="page-header">
  <h2>Materials</h2>
  <button mat-raised-button color="primary"><mat-icon>add</mat-icon> Add Material</button>
</div>

<mat-card>
  <mat-card-content>
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search materials</mat-label>
      <input matInput [(ngModel)]="searchText" (keyup)="applyFilter()">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

    <div class="table-responsive">
      <table mat-table [dataSource]="dataSource" matSort class="full-width">
        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Date</th>
          <td mat-cell *matCellDef="let row">{{ row.date }}</td>
        </ng-container>
        <ng-container matColumnDef="billNo">
          <th mat-header-cell *matHeaderCellDef>Bill No</th>
          <td mat-cell *matCellDef="let row" class="mono">{{ row.billNo }}</td>
        </ng-container>
        <ng-container matColumnDef="itemName">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Item</th>
          <td mat-cell *matCellDef="let row">{{ row.itemName }}</td>
        </ng-container>
        <ng-container matColumnDef="quantity">
          <th mat-header-cell *matHeaderCellDef>Qty</th>
          <td mat-cell *matCellDef="let row">{{ row.quantity }}</td>
        </ng-container>
        <ng-container matColumnDef="rate">
          <th mat-header-cell *matHeaderCellDef>Rate</th>
          <td mat-cell *matCellDef="let row" class="amount">₹{{ row.rate | number }}</td>
        </ng-container>
        <ng-container matColumnDef="amount">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Amount</th>
          <td mat-cell *matCellDef="let row" class="amount total">₹{{ row.amount | number }}</td>
        </ng-container>
        <ng-container matColumnDef="siteName">
          <th mat-header-cell *matHeaderCellDef>Site</th>
          <td mat-cell *matCellDef="let row">{{ row.siteName }}</td>
        </ng-container>
        <ng-container matColumnDef="shopName">
          <th mat-header-cell *matHeaderCellDef>Shop</th>
          <td mat-cell *matCellDef="let row">{{ row.shopName }}</td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let row">
            <button mat-icon-button color="primary" matTooltip="Edit"><mat-icon>edit</mat-icon></button>
            <button mat-icon-button color="warn" matTooltip="Delete" (click)="deleteRow(row.id)"><mat-icon>delete</mat-icon></button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
    <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons></mat-paginator>
  </mat-card-content>
</mat-card>
